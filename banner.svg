<svg width="100%" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .gc-t{font-family:'Orbitron','Share Tech Mono',monospace;font-weight:900;font-size:72px;letter-spacing:.07em}
      .gc-s{font-family:'Share Tech Mono',monospace;font-size:15px;letter-spacing:.22em}
      .gc-m{font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:.1em}
      @keyframes gc-g1{0%,88%,100%{opacity:0;transform:none}89%{opacity:.75;transform:translateX(-5px)}91%{opacity:0}94%{opacity:.45;transform:translateX(5px)}96%{opacity:0}}
      @keyframes gc-g2{0%,88%,100%{opacity:0;transform:none}90%{opacity:.65;transform:translateX(5px)}92%{opacity:0}95%{opacity:.35;transform:translateX(-4px)}97%{opacity:0}}
      @keyframes gc-fl{0%,88%,100%{transform:none}89%{transform:skew(-1.2deg)}91%{transform:skew(1.2deg) translateX(4px)}93%{transform:none}95%{transform:skew(-.7deg) translateX(-2px)}97%{transform:none}}
      @keyframes gc-blink{50%{opacity:0}}
      @keyframes gc-dot{0%,100%{opacity:1}50%{opacity:.1}}
      @keyframes gc-scan{0%{transform:translateY(-60px)}100%{transform:translateY(380px)}}
      @keyframes gc-pulse{0%,100%{opacity:.7}50%{opacity:1}}
      @keyframes gc-ring{0%,100%{stroke-opacity:.5}50%{stroke-opacity:.9}}
      .gc-g1{animation:gc-g1 8s 3s infinite}
      .gc-g2{animation:gc-g2 8s 3.1s infinite}
      .gc-mn{animation:gc-fl 8s 3s infinite}
      .gc-cur{animation:gc-blink 1s step-end infinite}
      .gc-dot{animation:gc-dot 2.2s infinite}
      .gc-sc{animation:gc-scan 5s linear infinite}
      .gc-ghost{animation:gc-pulse 3s ease-in-out infinite}
      .gc-ring{animation:gc-ring 2.5s ease-in-out infinite}
    </style>
    <pattern id="gc-dp" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1.1" fill="rgba(255,45,45,0.04)"/>
    </pattern>
    <pattern id="gc-scl" x="0" y="0" width="1200" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="2" width="1200" height="2" fill="rgba(0,0,0,0.12)"/>
    </pattern>
    <radialGradient id="gc-fade" cx="50%" cy="50%" r="58%">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <mask id="gc-m"><rect width="1200" height="320" fill="url(#gc-fade)"/></mask>
    <clipPath id="gc-c1"><rect x="0" y="120" width="1200" height="46"/></clipPath>
    <clipPath id="gc-c2"><rect x="0" y="164" width="1200" height="44"/></clipPath>
    <filter id="gc-glow"><feGaussianBlur stdDeviation="7" result="b"/><feComposite in="SourceGraphic" in2="b" operator="over"/></filter>
  </defs>

  <rect width="1200" height="320" fill="#07060f"/>
  <rect width="1200" height="320" fill="url(#gc-dp)" mask="url(#gc-m)"/>
  <rect width="1200" height="320" fill="url(#gc-scl)"/>
  <rect class="gc-sc" x="0" y="0" width="1200" height="44" fill="rgba(255,45,45,0.025)"/>

  <!-- Ghost silhouette (left) -->
  <g transform="translate(86,162)" class="gc-ghost">
    <path d="M0,-40 Q22,-50 40,-30 Q50,-8 48,20 Q46,38 36,42 L28,34 L20,42 L12,34 L4,42 L-4,34 L-12,42 L-20,34 L-28,42 L-36,42 Q-48,38 -48,20 Q-48,-8 -38,-30 Q-20,-50 0,-40 Z"
          fill="none" stroke="#ff2d2d" stroke-width="1.4" opacity=".62"/>
    <ellipse cx="-14" cy="-4" rx="7" ry="9" fill="#ff2d2d" opacity=".55"/>
    <ellipse cx="14"  cy="-4" rx="7" ry="9" fill="#ff2d2d" opacity=".55"/>
    <circle  cx="-12" cy="-7" r="2.5" fill="#00cfff" opacity=".75"/>
    <circle  cx="16"  cy="-7" r="2.5" fill="#00cfff" opacity=".75"/>
  </g>

  <!-- Radar (right) -->
  <g transform="translate(1118,162)" opacity=".4">
    <circle class="gc-ring" cx="0" cy="0" r="40" fill="none" stroke="#ff2d2d" stroke-width="1"/>
    <circle class="gc-ring" cx="0" cy="0" r="26" fill="none" stroke="#ff2d2d" stroke-width=".8" style="animation-delay:.5s"/>
    <circle class="gc-ring" cx="0" cy="0" r="13" fill="none" stroke="#ff2d2d" stroke-width=".6" style="animation-delay:1s"/>
    <circle cx="0" cy="0" r="3.5" fill="#ff2d2d" opacity=".8"/>
    <line x1="0" y1="0" x2="32" y2="-20" stroke="#00cfff" stroke-width="1" opacity=".5"/>
    <line x1="-40" y1="0" x2="40" y2="0" stroke="#ff2d2d" stroke-width=".4" opacity=".2"/>
    <line x1="0" y1="-40" x2="0" y2="40" stroke="#ff2d2d" stroke-width=".4" opacity=".2"/>
  </g>

  <!-- Frame -->
  <path d="M142 36 L142 66 M142 36 L186 36" stroke="#ff2d2d" stroke-width="1.8" fill="none" opacity=".75"/>
  <path d="M1058 36 L1058 66 M1058 36 L1014 36" stroke="#ff2d2d" stroke-width="1.8" fill="none" opacity=".75"/>
  <path d="M142 284 L142 254 M142 284 L186 284" stroke="#ff2d2d" stroke-width="1.8" fill="none" opacity=".75"/>
  <path d="M1058 284 L1058 254 M1058 284 L1014 284" stroke="#ff2d2d" stroke-width="1.8" fill="none" opacity=".75"/>
  <line x1="142" y1="36"  x2="1058" y2="36"  stroke="#ff2d2d" stroke-width=".5" opacity=".15"/>
  <line x1="142" y1="284" x2="1058" y2="284" stroke="#ff2d2d" stroke-width=".5" opacity=".15"/>

  <!-- Top badge -->
  <rect x="415" y="44" width="370" height="22" fill="rgba(255,45,45,0.07)" rx="1"/>
  <text class="gc-m" x="600" y="59" text-anchor="middle" fill="#ff2d2d" opacity=".85">// WEB INTELLIGENCE &amp; SECURITY SCANNER //</text>

  <!-- Title -->
  <text class="gc-t"    x="600" y="190" text-anchor="middle" fill="#ff2d2d" opacity=".15" filter="url(#gc-glow)">GhostCheck</text>
  <text class="gc-t gc-g1" x="600" y="190" text-anchor="middle" fill="#00cfff" opacity="0" clip-path="url(#gc-c1)">GhostCheck</text>
  <text class="gc-t gc-g2" x="600" y="190" text-anchor="middle" fill="#ff5555" opacity="0" clip-path="url(#gc-c2)">GhostCheck</text>
  <text class="gc-t gc-mn" x="600" y="190" text-anchor="middle" fill="#ff2d2d">GhostCheck</text>

  <!-- Divider -->
  <line x1="190" y1="207" x2="1010" y2="207" stroke="rgba(255,45,45,.12)" stroke-width=".5"/>
  <line x1="562" y1="207" x2="638" y2="207" stroke="#ff2d2d" stroke-width="1.7" opacity=".8"/>

  <!-- Subtitle -->
  <text class="gc-s" x="600" y="238" text-anchor="middle" fill="#e2dff0" opacity=".38">SSL · DNS · WHOIS · Ports · WAF · TLS · Threats · Headers</text>

  <!-- Bottom row -->
  <circle class="gc-dot" cx="166" cy="265" r="4" fill="#ff2d2d"/>
  <text class="gc-m" x="178" y="269" fill="#ff2d2d" opacity=".7">GHOST</text>
  <text class="gc-m" x="254" y="269" fill="rgba(226,223,240,.28)">by:</text>
  <text class="gc-m" x="283" y="269" fill="rgba(226,223,240,.62)">krypthane</text>
  <text class="gc-m" x="600" y="269" text-anchor="middle" fill="rgba(255,45,45,.38)">v2.0 · ethical use only · MIT open source</text>
  <text class="gc-m" x="948" y="269" fill="rgba(226,223,240,.28)">github:</text>
  <text class="gc-m" x="1010" y="269" fill="rgba(226,223,240,.62)">wavegxz-design</text>

  <!-- Prompt -->
  <text class="gc-m" x="166" y="299" fill="#00cfff" opacity=".3">$ ghostcheck scan https://target.com<tspan class="gc-cur" fill="#00cfff" opacity=".6">&#x25AE;</tspan></text>
</svg>
